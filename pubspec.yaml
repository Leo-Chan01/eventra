name: eventra
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Navigation
  go_router: ^14.7.2

  # Networking & API calls
  dio: ^5.7.0
  retrofit: ^4.1.0

  # UI/UX & Styling
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^7.0.0

  flutter_screenutil: ^5.9.3
  flutter_native_splash: ^2.4.7

  # Service Locator
  get_it: ^8.0.2

  # Utilities
  shared_preferences: ^2.3.5
  equatable: ^2.0.7

  intl_phone_field: ^3.2.0
  pinput: ^5.0.0
  cupertino_icons: ^1.0.8
  hugeicons: ^1.1.0
  lottie: ^3.1.2
  flutter_dotenv: ^5.2.1

  # Map & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geocoding: ^3.0.0
  geolocator: ^13.0.2
  http: ^1.2.2
  flutter_secure_storage: ^10.0.0
  webview_flutter: ^4.13.0
  firebase_core: ^4.4.0
  uuid: ^4.5.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_local_notifications: ^20.1.0
  firebase_messaging: ^16.1.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1
  json_annotation: ^4.9.0
  provider: ^6.1.5+1
  dartz: ^0.10.1

dev_dependencies:
  bloc_lint: ^0.4.0
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.23
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
  json_serializable: ^6.11.3
  build_runner: ^2.10.4
  retrofit_generator: ^10.2.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter_18pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter/Inter_18pt-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter/Inter_18pt-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/Inter_18pt-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter/Inter_18pt-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Inter/Inter_18pt-Black.ttf
          weight: 900
        - asset: assets/fonts/Inter/Inter_18pt-BlackItalic.ttf
          weight: 900
          style: italic
